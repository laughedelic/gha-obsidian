name: CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        type: string
        default: "20"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run lint --if-present

      - run: npm run build

      - run: npm test --if-present

name: Obsidian Plugin Release
description: >
  Build, attest, and publish a GitHub release for an Obsidian plugin.
  Assumes Node.js is already set up and the repo is already checked out.

runs:
  using: composite
  steps:
    - run: npm ci
      shell: bash

    - run: npm run build
      shell: bash

    - run: npm test --if-present
      shell: bash

    # Obsidian expects main.js and manifest.json, plus styles.css if the plugin has one
    - name: Collect release assets
      id: assets
      shell: bash
      run: |
        assets="main.js manifest.json"
        if [[ -f styles.css ]]; then
          assets="$assets styles.css"
        fi
        echo "list=$assets" >> "$GITHUB_OUTPUT"
        {
          echo "paths<<EOF"
          tr ' ' '\n' <<< "$assets"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Attest build provenance
      uses: actions/attest-build-provenance@v4
      with:
        subject-path: ${{ steps.assets.outputs.paths }}

    - name: Create release
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        version="$(jq -r .version manifest.json)"
        if gh release view "$version" >/dev/null 2>&1; then
          echo "Release $version already exists, skipping."
          exit 0
        fi
        gh release create "$version" \
          --target "$GITHUB_SHA" \
          --title "$version" \
          --generate-notes \
          ${{ steps.assets.outputs.list }}

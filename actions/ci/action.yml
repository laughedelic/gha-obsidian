name: Obsidian Plugin CI
description: Install, lint, build, and test an Obsidian plugin

inputs:
  node-version:
    description: Node.js version to use (left empty to use setup-node's own default, i.e. whatever's pre-installed on the runner)

runs:
  using: composite
  steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - run: npm ci
      shell: bash

    - run: npm run lint --if-present
      shell: bash

    - run: npm run build
      shell: bash

    - run: npm test --if-present
      shell: bash

name: Obsidian Plugin E2E Tests
description: >
  Build the plugin and run its e2e test script under xvfb-run, with the
  Obsidian binary cache and (optionally) a real window manager for tests
  that depend on focus/hover behavior. Assumes Node.js is already set up
  and the repo is already checked out.

inputs:
  test-script:
    description: >
      npm script to run for the e2e tests (e.g. test:e2e or
      test:e2e:mobile). Call this action/workflow once per script if you
      have separate desktop/mobile e2e suites.
    required: true
  versions-lock-command:
    description: >
      Shell command to run (after npm ci, before build) whose stdout is
      hashed for the Obsidian binary cache key -- typically something that
      prints the Obsidian version(s) your e2e config resolves and
      downloads, so the cache invalidates when the pinned version changes.
      Leave empty for a single, non-version-aware cache entry.
    default: ""
  window-manager:
    description: >
      Install and run herbstluftwm + dzen2 under Xvfb, for tests that need
      real window management (e.g. focus/hover behavior) rather than a bare
      X server.
    default: "false"
  window-manager-packages:
    description: >
      Extra apt packages to install alongside herbstluftwm + dzen2
      (space-separated). herbstluftwm's default autostart script calls
      xsetroot, which isn't pulled in by herbstluftwm or dzen2 themselves --
      pass "x11-xserver-utils" if your autostart isn't overridden and you
      hit "xsetroot: command not found" / herbstluftwm dying on startup.
      Only used when window-manager is true.
    default: ""

runs:
  using: composite
  steps:
    - run: npm ci
      shell: bash

    - name: Resolve Obsidian versions lock
      if: inputs.versions-lock-command != ''
      shell: bash
      run: |
        set -o pipefail
        ${{ inputs.versions-lock-command }} > obsidian-versions.lock
        rm -rf .obsidian-cache

    - run: npm run build
      shell: bash

    - uses: actions/cache@v4
      with:
        path: .obsidian-cache
        key: obsidian-cache-${{ runner.os }}-${{ case(inputs.versions-lock-command != '', hashFiles('obsidian-versions.lock'), 'latest') }}

    - name: Install window manager
      if: inputs.window-manager == 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y herbstluftwm dzen2 ${{ inputs.window-manager-packages }}

    - name: Run e2e tests
      shell: bash
      run: |
        prefix=""
        if [[ "${{ inputs.window-manager }}" == "true" ]]; then
          # give herbstluftwm a moment to attach to the display before tests
          # start probing focus/hover state, or the first assertions race it
          prefix="herbstluftwm & dzen2 & sleep 1; "
        fi
        xvfb-run --auto-servernum bash -c "${prefix}npm run ${{ inputs.test-script }}"
